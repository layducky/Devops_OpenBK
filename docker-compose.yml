services:
  backend:
    image: layducky/openbk-be:1.2.5
    container_name: opbk_backend
    restart: always
    env_file: .env.be
    expose:
      - "5000"

  frontend:
    image: layducky/openbk-fe:1.2.2
    build:
      context: ../Open_BK_FE
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: opbk_frontend
    restart: always
    env_file: .env.fe
    expose:
      - "3000"
    depends_on:
      - backend

  nginx:
    image: nginx:latest
    container_name: opbk_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

