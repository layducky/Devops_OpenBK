services:
  backend:
    image: layducky/openbk-be:1.3.0
    container_name: opbk_backend
    restart: always
    env_file: .env.be
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis
    expose:
      - "5000"

  frontend:
    image: layducky/openbk-fe:1.3.0
    container_name: opbk_frontend
    restart: always
    env_file: .env.fe
    expose:
      - "3000"
    depends_on:
      - backend

  nginx:
    image: nginx:latest
    container_name: opbk_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend

  redis:
    image: redis:7-alpine
    container_name: opbk_redis
    restart: always
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

volumes:
  redis-data: {}
